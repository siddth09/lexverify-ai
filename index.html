<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexVerify AI - Legal Validator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Tesseract OCR CDN -->
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        [lucide] { width: 1.25rem; height: 1.25rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="app" class="max-w-5xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i data-lucide="scale" class="w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">LexVerify AI</h1>
                    <p class="text-slate-500 text-sm font-medium">Standalone Legal Validator v3.1</p>
                </div>
            </div>
            <button onclick="toggleSettings()" class="p-2 rounded-full text-indigo-600 bg-indigo-50 hover:bg-indigo-100 transition-all">
                <i data-lucide="settings"></i>
            </button>
        </header>

        <!-- API Key Panel -->
        <div id="settingsPanel" class="hidden mb-6 bg-white p-6 rounded-2xl border-2 border-indigo-100 shadow-xl animate-in slide-in-from-top-2">
            <div class="flex items-center gap-2 mb-4 font-bold text-slate-800">
                <i data-lucide="key" class="text-indigo-600"></i> API Configuration
            </div>
            <p class="text-sm text-slate-500 mb-4">Keys are stored locally in your browser. Get one at <a href="https://aistudio.google.com/" target="_blank" class="text-indigo-600 underline">Google AI Studio</a>.</p>
            <div class="flex gap-2">
                <input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key..." class="flex-1 px-4 py-2 border border-slate-200 rounded-xl outline-none font-mono text-sm">
                <button onclick="saveApiKey()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700">Save</button>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex gap-1 bg-slate-200/50 p-1 rounded-xl mb-6 w-fit">
            <button onclick="switchTab('upload')" id="tab-upload" class="px-4 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-indigo-600">1. Document Input</button>
            <button onclick="switchTab('results')" id="tab-results" class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-400 cursor-not-allowed" disabled>2. Audit Results</button>
        </div>

        <!-- Tab: Upload/Input -->
        <section id="uploadSection" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col items-center text-center">
                    <div class="bg-indigo-50 p-3 rounded-full mb-3 text-indigo-600">
                        <i data-lucide="file-up"></i>
                    </div>
                    <h3 class="font-bold text-slate-800 text-sm mb-1">Upload File</h3>
                    <p class="text-[10px] text-slate-500 mb-4">PDF, JPG, PNG</p>
                    <input type="file" id="fileInput" hidden accept=".pdf,image/*" onchange="handleFileUpload(event)">
                    <button onclick="document.getElementById('fileInput').click()" class="w-full bg-indigo-600 text-white py-2 rounded-xl text-xs font-bold hover:bg-indigo-700">Choose File</button>
                </div>
                <div class="md:col-span-3 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex items-center gap-2 mb-3 px-2 font-bold text-[10px] text-slate-400 uppercase tracking-widest">
                        <i data-lucide="book-open"></i> Sample Library
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2" id="sampleContainer"></div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                    <div class="flex items-center gap-2 font-bold text-slate-700 text-sm">
                        <i data-lucide="type" class="text-indigo-500"></i> Document Editor
                    </div>
                    <button onclick="runAudit()" id="auditBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2 rounded-full font-bold shadow-lg transition-all flex items-center gap-2">
                        <i data-lucide="shield-check"></i> Run AI Audit
                    </button>
                </div>
                <div class="p-4">
                    <div id="progressContainer" class="hidden mb-4 bg-indigo-50 border border-indigo-100 p-4 rounded-xl">
                        <div class="flex justify-between mb-2">
                            <span id="progressText" class="text-xs font-bold text-indigo-700">Processing...</span>
                            <span id="progressPercent" class="text-xs font-bold text-indigo-700">0%</span>
                        </div>
                        <div class="w-full bg-indigo-200 h-1 rounded-full overflow-hidden">
                            <div id="progressBar" class="bg-indigo-600 h-full w-0 transition-all duration-300"></div>
                        </div>
                    </div>
                    <textarea id="editor" placeholder="Paste text or upload a file..." class="w-full h-80 p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none font-mono text-sm resize-none focus:ring-2 focus:ring-indigo-200"></textarea>
                    <div id="errorBox" class="hidden mt-4 p-4 bg-red-50 text-red-700 text-xs rounded-xl border border-red-100 font-bold whitespace-pre-wrap"></div>
                </div>
            </div>
        </section>

        <!-- Tab: Results -->
        <section id="resultsSection" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-center items-center">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Compliance Score</p>
                    <span id="resultScore" class="text-6xl font-black">--</span>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 md:col-span-2">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Audit Summary</p>
                    <p id="resultSummary" class="text-slate-700 font-medium leading-relaxed">Analyzing...</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 font-bold flex items-center gap-2">
                    <i data-lucide="search" class="text-indigo-500"></i> Mandatory Clauses
                </div>
                <div id="clauseList" class="divide-y divide-slate-100"></div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 bg-red-50/30 flex justify-between items-center">
                    <h3 class="font-bold text-red-800 flex items-center gap-2"><i data-lucide="alert-triangle"></i> Detected Risks</h3>
                </div>
                <div id="riskList" class="divide-y divide-slate-100"></div>
            </div>

            <div class="flex justify-center pb-8">
                <button onclick="switchTab('upload')" class="text-slate-400 font-bold hover:text-indigo-600 transition-all flex items-center gap-2">
                    <i data-lucide="chevron-left"></i> Back to Editor
                </button>
            </div>
        </section>
    </div>

    <script>
        // Constants & Samples
        const SAMPLES = [
            { title: "Onerous & Clawback", type: "High Risk", text: "EMPLOYMENT AGREEMENT\n1. Bonus: $10k.\n2. Clawback: If you leave within 3 years, you repay 100% of gross bonus.\n3. Payment: Expenses paid 200 days after submittal.\n4. Non-compete: No working in tech globally for 10 years." },
            { title: "Standard NDA", type: "Safe", text: "NON-DISCLOSURE AGREEMENT\nEffective Date: Jan 1, 2024.\nParties: Co A and Co B.\nTerm: 2 years.\nGoverning Law: Delaware." },
            { title: "Risky Service", type: "Risky", text: "SERVICE TERMS\nLiability: We are never liable for anything.\nChanges: We can change price daily without notice.\nTermination: You cannot terminate for 5 years." },
            { title: "Incomplete MOU", type: "Missing", text: "MOU\nWe will work on a project.\nSigned, User." }
        ];

        // Global State
        let currentApiKey = localStorage.getItem('lexverify_api_key') || '';
        
        // Initialize PDF.js
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Startup
        window.onload = () => {
            lucide.createIcons();
            renderSamples();
            if (!currentApiKey) toggleSettings();
            else document.getElementById('apiKeyInput').value = currentApiKey;
        };

        // UI Functions
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('hidden');
        }

        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if (val) {
                currentApiKey = val;
                localStorage.setItem('lexverify_api_key', val);
                toggleSettings();
                document.getElementById('errorBox').classList.add('hidden');
            }
        }

        function renderSamples() {
            const container = document.getElementById('sampleContainer');
            SAMPLES.forEach(s => {
                const btn = document.createElement('button');
                btn.className = "text-left p-3 rounded-xl border border-slate-100 hover:bg-indigo-50/50 hover:border-indigo-100 transition-all text-xs group";
                btn.onclick = () => {
                    document.getElementById('editor').value = s.text;
                    document.getElementById('errorBox').classList.add('hidden');
                };
                btn.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-slate-800">${s.title}</span>
                        <span class="text-[9px] bg-slate-100 px-1.5 py-0.5 rounded">${s.type}</span>
                    </div>
                `;
                container.appendChild(btn);
            });
        }

        function switchTab(tab) {
            if (tab === 'results' && document.getElementById('tab-results').disabled) return;
            
            document.getElementById('uploadSection').classList.toggle('hidden', tab !== 'upload');
            document.getElementById('resultsSection').classList.toggle('hidden', tab !== 'results');
            
            const upTab = document.getElementById('tab-upload');
            const resTab = document.getElementById('tab-results');
            
            if (tab === 'upload') {
                upTab.className = "px-4 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-indigo-600";
                resTab.className = "px-4 py-2 rounded-lg text-sm font-semibold text-slate-400";
            } else {
                resTab.className = "px-4 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-indigo-600";
                upTab.className = "px-4 py-2 rounded-lg text-sm font-semibold text-slate-400";
            }
        }

        // File Processing
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const progCont = document.getElementById('progressContainer');
            const progBar = document.getElementById('progressBar');
            const progText = document.getElementById('progressText');
            const progPerc = document.getElementById('progressPercent');

            progCont.classList.remove('hidden');
            document.getElementById('errorBox').classList.add('hidden');

            try {
                if (file.type === 'application/pdf') {
                    progText.innerText = "Extracting PDF Text...";
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await window.pdfjsLib.getDocument(arrayBuffer).promise;
                    let text = "";
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(" ") + "\n";
                        const pc = Math.round((i / pdf.numPages) * 100);
                        progBar.style.width = pc + "%";
                        progPerc.innerText = pc + "%";
                    }
                    document.getElementById('editor').value = text;
                } else if (file.type.startsWith('image/')) {
                    progText.innerText = "Running OCR Scan...";
                    const result = await Tesseract.recognize(file, 'eng', {
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                const pc = Math.round(m.progress * 100);
                                progBar.style.width = pc + "%";
                                progPerc.innerText = pc + "%";
                            }
                        }
                    });
                    document.getElementById('editor').value = result.data.text;
                }
            } catch (err) {
                showError("File processing failed: " + err.message);
            } finally {
                setTimeout(() => progCont.classList.add('hidden'), 1000);
            }
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.innerText = msg;
            box.classList.remove('hidden');
            box.scrollIntoView({ behavior: 'smooth' });
        }

        /**
         * Mandatory Exponential Backoff Fetch Implementation
         */
        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    
                    if (response.ok) return response;
                    
                    // Specific handling for common API errors
                    if (response.status === 401) throw new Error("Invalid API Key. Please update your key in Settings.");
                    if (response.status === 404) throw new Error("Model endpoint not found. Please check API version.");
                    if (response.status === 429) {
                        // Rate limit - definitely retry
                        if (i === maxRetries - 1) throw new Error("Rate limit exceeded. Please try again in a few minutes.");
                    } else if (response.status >= 500) {
                        // Server error - definitely retry
                        if (i === maxRetries - 1) throw new Error("Google AI Server is currently unavailable (500).");
                    } else {
                        // Other non-ok responses
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error?.message || `API Error: ${response.status}`);
                    }
                } catch (err) {
                    if (i === maxRetries - 1 || err.message.includes("API Key") || err.message.includes("endpoint")) throw err;
                    // Exponential backoff
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        // AI Audit Logic
        async function runAudit() {
            const text = document.getElementById('editor').value.trim();
            if (!text) return showError("Please provide document text.");
            if (!currentApiKey) return showError("Please set your Gemini API Key in Settings.");

            const btn = document.getElementById('auditBtn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin"></i> Auditing...`;
            lucide.createIcons();
            document.getElementById('errorBox').classList.add('hidden');

            const systemPrompt = `You are a specialized Legal Document Auditor. 
            Analyze the provided document and perform a risk assessment.
            Categorize findings into: 
            1. Mandatory Clauses (Parties, Date, Termination, Governing Law).
            2. Onerous Clauses (Burdensome payment terms, unfair liability shifts).
            3. Clawback Provisions (Recovery of paid bonuses/fees).
            4. Prohibited/Restrictive (Illegal non-competes, restraint of trade).`;

            const userQuery = `Analyze the following legal document and provide a structured audit report: \n\n${text}`;

            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { 
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            score: { type: "NUMBER" },
                            summary: { type: "STRING" },
                            clauses: { 
                                type: "ARRAY", 
                                items: { 
                                    type: "OBJECT", 
                                    properties: { 
                                        name: { type: "STRING" }, 
                                        found: { type: "BOOLEAN" } 
                                    } 
                                } 
                            },
                            risks: { 
                                type: "ARRAY", 
                                items: { 
                                    type: "OBJECT", 
                                    properties: { 
                                        level: { type: "STRING" }, 
                                        type: { type: "STRING" }, 
                                        description: { type: "STRING" }, 
                                        remedy: { type: "STRING" } 
                                    } 
                                } 
                            }
                        },
                        required: ["score", "summary", "clauses", "risks"]
                    }
                }
            };

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${currentApiKey}`;
                const response = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!resultText) throw new Error("AI returned an empty response.");
                
                const result = JSON.parse(resultText);
                displayResults(result);
            } catch (err) {
                showError(err.message || "An unexpected error occurred during the AI Audit.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                lucide.createIcons();
            }
        }

        function displayResults(data) {
            document.getElementById('resultScore').innerText = data.score + "%";
            document.getElementById('resultScore').className = `text-6xl font-black ${data.score > 70 ? 'text-emerald-500' : 'text-red-500'}`;
            document.getElementById('resultSummary').innerText = data.summary;

            const cList = document.getElementById('clauseList');
            cList.innerHTML = "";
            data.clauses.forEach(c => {
                const div = document.createElement('div');
                div.className = "p-4 flex items-center justify-between";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <i data-lucide="${c.found ? 'check-circle' : 'x-circle'}" class="${c.found ? 'text-emerald-500' : 'text-red-400'}"></i>
                        <span class="font-bold text-slate-700 text-sm">${c.name}</span>
                    </div>
                `;
                cList.appendChild(div);
            });

            const rList = document.getElementById('riskList');
            rList.innerHTML = "";
            if (!data.risks || data.risks.length === 0) {
                rList.innerHTML = `<div class="p-10 text-center text-slate-400 font-bold">No risks detected.</div>`;
            } else {
                data.risks.forEach(r => {
                    const div = document.createElement('div');
                    div.className = "p-6 hover:bg-slate-50/50 transition-colors";
                    div.innerHTML = `
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-[9px] font-black px-2 py-0.5 rounded uppercase ${r.level === 'High' ? 'bg-red-600 text-white' : 'bg-amber-400 text-white'}">${r.level}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${r.type}</span>
                        </div>
                        <h4 class="font-bold text-slate-800 mb-1">${r.description}</h4>
                        <div class="mt-3 p-3 bg-emerald-50 rounded-lg text-xs text-emerald-800">
                            <strong class="uppercase text-[9px] mr-1">Proposed Remedy:</strong> ${r.remedy}
                        </div>
                    `;
                    rList.appendChild(div);
                });
            }

            document.getElementById('tab-results').disabled = false;
            switchTab('results');
            lucide.createIcons();
        }
    </script>
</body>
</html>
